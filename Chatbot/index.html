<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Chatbot</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button id="logout" class="logout-btn">Logout</button>
    <div class="chat-container">
        <div class="bot-chat-box">
            <img src="images/chatbot.png" alt="" id="botImage" width="8%">
            <div class="bot-chat-area">
               Hi there! How can we help you today?
            </div>
            
        </div>
    </div>
    <div class="prompt-area">
<input type="text" id="prompt" placeholder="Message...">
<button id="image"><img src="img.svg" alt="">
<input type="file" accept="images/*" hidden></button>
<button id="submit"><img src="submit.svg" alt=""></button>
    </div>
    <script src="script.js"></script>
</body>

</html>
